<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{ --navy:#0E2841; --teal:#156082; --teal2:#0F9ED5; --orange:#E97132; --peach:#ffd0b0; --muted:#5b6b7a; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  .og{
    width:1200px; height:630px; position:relative; overflow:hidden; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Hiragino Sans GB",sans-serif;
    background:
      radial-gradient(820px 360px at 84% -16%, rgba(15,158,213,.32), transparent 60%),
      linear-gradient(150deg,#0E2841 0%,#14405e 52%,#156082 100%);
    display:flex; align-items:center; gap:46px; padding:60px 72px;
  }
  .left{ flex:1; min-width:0; }
  .cobrand{ display:inline-flex; align-items:center; gap:14px; background:#fff; border-radius:999px; padding:10px 22px; box-shadow:0 8px 22px rgba(7,23,41,.24); }
  .cobrand img.thingx{ height:23px; width:auto; display:block; }
  .cobrand img.aiot{ height:34px; width:auto; display:block; }
  .cobrand .x{ font-size:21px; color:#9fb1c0; }
  .cobrand .lab{ font-size:20px; font-weight:700; color:var(--navy); }
  .title{ font-size:74px; font-weight:800; letter-spacing:-2px; line-height:1; margin-top:24px; }
  .tagline{ font-size:31px; font-weight:600; line-height:1.22; margin-top:18px; color:#eaf3fa; max-width:640px; }
  .tagline .hl{ color:var(--peach); }
  .url{ display:inline-flex; align-items:center; gap:10px; margin-top:28px; font-size:25px; font-weight:700; color:#dff1fb; }
  .url .dot{ color:var(--orange); }
  .photo{ width:330px; height:330px; flex:none; background:#fff; border-radius:28px; padding:20px; box-shadow:0 26px 60px rgba(7,23,41,.40); display:flex; align-items:center; justify-content:center; }
  .photo img{ width:100%; height:100%; object-fit:contain; }
  .bar{ position:absolute; left:0; right:0; bottom:0; height:12px; background:linear-gradient(90deg,var(--orange),#f0a06a 60%,var(--teal2)); }
</style>
</head>
<body>
  <div class="og">
    <div class="left">
      <div class="cobrand"><img class="thingx" src="../../site/assets/img/thingx-logo.png"><span class="x">×</span><img class="aiot" src="../../site/assets/img/aiot-lab-logo.svg"><span class="lab">AIoT Lab · CUHK</span></div>
      <div class="title">Nuna-Edu-Toolkit</div>
      <div class="tagline">Turn everyday ambient sound into <span class="hl">research-ready, first-person audio datasets</span>.</div>
      <div class="url"><span class="dot">▶</span> kevin-pal.github.io/nuna-edu-toolkit-release</div>
    </div>
    <div class="photo"><img src="../../site/assets/img/nuna-pendant.png"></div>
    <div class="bar"></div>
  </div>
</body>
</html>
