<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Audio Lab (Demo)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/demo.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="demo-banner">
    <span><i class="bi bi-info-circle"></i> <strong>Demo mode</strong> — data is not saved;
    <a href="https://github.com/Kevin-Pal/nuna-edu-toolkit-release" target="_blank" rel="noopener">self-host</a> for the full experience.</span>
    <a class="demo-banner-home" href="../index.html"><i class="bi bi-arrow-left"></i> Project site</a>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">Audio Lab <span class="demo-badge">DEMO</span></a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center mt-4">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Sign in</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-secondary small py-2">
                        This is a guided demo — just press <strong>Sign in</strong> to explore the annotation workspace.
                    </div>
                    <form id="loginForm" onsubmit="event.preventDefault(); window.location.href='tasks.html';">
                        <div class="mb-3">
                            <label for="userId" class="form-label">User ID</label>
                            <input type="text" class="form-control" id="userId" name="username" value="demo-user" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" value="demodemo" readonly>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Sign in</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <small>Want the real thing? <a href="https://github.com/Kevin-Pal/nuna-edu-toolkit-release" target="_blank" rel="noopener">Self-host the platform</a> (source available, non-commercial).</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/demo.js"></script>
</body>
</html>
